name: "MeTube"
version: "1.0.0"
slug: "metube"
description: "Self-hosted video downloader for YouTube and other sites (web UI for youtube-dl / yt-dlp)"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
startup: "services"
url: "https://github.com/x9132706292/hassos-addons/"
boot: "auto"
ports:
  8081/tcp: 8081      # Веб-интерфейс (внешний:8080 → внутренний:80)

# Маппинг томов Home Assistant [[14]]
map:
  - type: addon_config
    read_only: false
    path: /config/onlyoffice
  - type: downloads
    read_only: false
  - type: ssl
    read_only: true

# Опции для пользователя
options:
  storage_path: "/share/onlyoffice"
  log_level: "info"

schema:
  jwt_secret: "str?"
  storage_path: "str"
  log_level: "list(info|debug|warn|error)"
