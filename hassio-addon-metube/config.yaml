name: "MeTube"
version: "2026.06.0"
slug: metube
description: >-
  Веб-интерфейс для скачивания видео с YouTube и других сайтов через yt-dlp
arch:
  - amd64
  - aarch64
  - armv7
url: "https://github.com/alexta69/metube"
init: false  # MeTube использует собственный entrypoint

# Сетевые настройки
ports:
  8081/tcp: 8081
ports_description:
  8081/tcp: "Веб-интерфейс MeTube"

# Запуск после старта Home Assistant
startup: application
boot: auto

# Web UI для доступа через Ingress или напрямую
webui: "http://[HOST]:[PORT:8081]/"
ingress: true
ingress_port: 8081
ingress_entry: "/"
panel_icon: "mdi:youtube"
panel_title: "MeTube"

# Маппинг директорий
map:
  - type: share
    read_only: false
    path: /downloads
  - type: addon_config
    read_only: false


# Опции конфигурации для пользователя
options:
  DOWNLOAD_DIR: "/share/downloads"
  puid: 1000
  pgid: 1000
  max_concurrent_downloads: 2
  yt_dlp_args: ""

schema:
  download_dir: str
  puid: int(0,)
  pgid: int(0,)
  max_concurrent_downloads: int(1,10)
  yt_dlp_args: str?

# Образ для публикации (опционально)
# image: "ghcr.io/your-username/metube-{arch}"

# Права доступа
hassio_api: false
homeassistant_api: false
docker_api: false
privileged: []

# Резервное копирование
backup: hot

# Мониторинг здоровья
watchdog: "http://[HOST]:[PORT:8081]/"
